name: Code Linting

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  lint:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt flake8

      - name: Run Flake8 Linter
        run: |
          cd backend
          flake8 app